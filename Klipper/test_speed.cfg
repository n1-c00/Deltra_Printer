# Ursprüngliche Quelle: https://github.com/AndrewEllis93/Print-Tuning-Guide/blob/main/macros/TEST_SPEED.cfg
[gcode_macro TEST_SPEED]
description: Delta-safe speed test
gcode:
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    {% set iterations = params.ITERATIONS|default(3)|int %}
    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    {% set bound = params.BOUND|default(5)|float %}
    {% set zheight = params.Z|default(400)|float %}

    # Für Delta besser Radius explizit oder konservativ wählen
    {% set radius = params.RADIUS|default((printer.toolhead.axis_maximum.x)/2|float - bound)|float %}

    # regelemaeßiges Hexagon
    # a nimmt folgende Werte an: 0°, 60°, 120°, 180°, 240°, 300° 
    # x=r*cos(a)
    # x=r*sin(a)

    # großes Hexagon 
    {% set x1 =  radius %}
    {% set y1 =  0 %}
    {% set x2 =  radius * 0.5 %}
    {% set y2 =  radius * 0.8660254 %}
    {% set x3 = -radius * 0.5 %}
    {% set y3 =  radius * 0.8660254 %}
    {% set x4 = -radius %}
    {% set y4 =  0 %}
    {% set x5 = -radius * 0.5 %}
    {% set y5 = -radius * 0.8660254 %}
    {% set x6 =  radius * 0.5 %}
    {% set y6 = -radius * 0.8660254 %}

    # kleines Hexagon
    {% set sr = radius * 0.35 %}
    {% set sx1 =  sr %}
    {% set sy1 =  0 %}
    {% set sx2 =  sr * 0.5 %}
    {% set sy2 =  sr * 0.8660254 %}
    {% set sx3 = -sr * 0.5 %}
    {% set sy3 =  sr * 0.8660254 %}
    {% set sx4 = -sr %}
    {% set sy4 =  0 %}
    {% set sx5 = -sr * 0.5 %}
    {% set sy5 = -sr * 0.8660254 %}
    {% set sx6 =  sr * 0.5 %}
    {% set sy6 = -sr * 0.8660254 %}

    SAVE_GCODE_STATE NAME=TEST_SPEED_DELTA
    G90
    M400

    { action_respond_info("TEST_SPEED_DELTA: %d iterations, speed=%d, accel=%d, radius=%.1f" % (iterations, speed, accel, radius)) }

    # Referenz
    G28
    G4 P500
    GET_POSITION

    # Limits setzen
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    {% endif %}

    # Startposition
    G0 X0 Y0 Z{zheight} F{speed*60}

    {% for i in range(iterations) %}
        # äußeres Hexagon
        G0 X{x1} Y{y1} F{speed*60}
        G0 X{x2} Y{y2} F{speed*60}
        G0 X{x3} Y{y3} F{speed*60}
        G0 X{x4} Y{y4} F{speed*60}
        G0 X{x5} Y{y5} F{speed*60}
        G0 X{x6} Y{y6} F{speed*60}
        G0 X{x1} Y{y1} F{speed*60}

        # Stern / lange Diagonalen
        G0 X{x4} Y{y4} F{speed*60}
        G0 X{x2} Y{y2} F{speed*60}
        G0 X{x5} Y{y5} F{speed*60}
        G0 X{x3} Y{y3} F{speed*60}
        G0 X{x6} Y{y6} F{speed*60}
        G0 X{x1} Y{y1} F{speed*60}

        # inneres Hexagon
        G0 X{sx1} Y{sy1} F{speed*60}
        G0 X{sx2} Y{sy2} F{speed*60}
        G0 X{sx3} Y{sy3} F{speed*60}
        G0 X{sx4} Y{sy4} F{speed*60}
        G0 X{sx5} Y{sy5} F{speed*60}
        G0 X{sx6} Y{sy6} F{speed*60}
        G0 X{sx1} Y{sy1} F{speed*60}

        # zurück Mitte
        G0 X0 Y0 F{speed*60}
    {% endfor %}

    # Limits zurücksetzen
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel}
    {% endif %}

    # Vergleich
    M400
    G28
    G4 P500
    GET_POSITION

    RESTORE_GCODE_STATE NAME=TEST_SPEED_DELTA