[gcode_button change_speed]
pin: host:gpio26
debounce_delay: 0.1

press_gcode:
    {% set slow_a = printer["gcode_macro _USER_VARIABLES"].slow_a|float %}
    {% set slow_v = printer["gcode_macro _USER_VARIABLES"].slow_v|float %}
    {% set cur_a  = printer.toolhead.max_accel|float %}
    {% set cur_v  = printer.toolhead.max_velocity|float %}
    {% set eps = 0.01 %}

    {% if (cur_a - slow_a)|abs > eps or (cur_v - slow_v)|abs > eps %}
        SET_VELOCITY_LIMIT VELOCITY={slow_v} ACCEL={slow_a}
        RESPOND MSG="langsame Konfiguration geladen: a={slow_a}, v={slow_v}"
    {% else %}
        RESPOND MSG="langsame Konfiguration bereits aktiv"
    {% endif %}

release_gcode:
    {% set fast_a = printer["gcode_macro _USER_VARIABLES"].fast_a|float %}
    {% set fast_v = printer["gcode_macro _USER_VARIABLES"].fast_v|float %}
    {% set cur_a  = printer.toolhead.max_accel|float %}
    {% set cur_v  = printer.toolhead.max_velocity|float %}
    {% set eps = 0.01 %}

    {% if (cur_a - fast_a)|abs > eps or (cur_v - fast_v)|abs > eps %}
        SET_VELOCITY_LIMIT VELOCITY={fast_v} ACCEL={fast_a}
        RESPOND MSG="schnelle Konfiguration geladen: a={fast_a}, v={fast_v}"
    {% else %}
        RESPOND MSG="schnelle Konfiguration bereits aktiv"
    {% endif %}