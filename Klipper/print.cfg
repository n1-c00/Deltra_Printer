[gcode_macro NOZZLE_CLEAN]
description: Clean Nozzle using BEACON_POKE
gcode:
    {% set radius = printer.toolhead.axis_maximum[0] - 1 %}
    {% set hs = printer["gcode_macro _USER_VARIABLES"].homing_speed %}

    SAVE_GCODE_STATE NAME=nozzle_clean_state
    G90
    G1 Z5 F{hs/4}
    {% for y in [0,20,40,60] %}
        {% set x = -((radius * radius - y * y) ** 0.5) %}
        G1 X{x} Y{y} F{hs/4}
        BEACON_POKE TOP=5 BOTTOM=-2
    {% endfor %}
    RESTORE_GCODE_STATE NAME=nozzle_clean_state

[gcode_macro PRINT_START]
gcode:
    {% set bed_temp = params.BED_TEMP|default(0)|float %}
    {% set hotend_temp = params.HOTEND_TEMP|default(0)|float %}
    {% set MESH = params.MESH|default(0)|int %}
    {% set hs = printer["gcode_macro _USER_VARIABLES"].homing_speed %}
    {% set radius = printer.toolhead.axis_maximum[0] - 1 %}
    M204 S6000
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={hotend_temp}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
    G28
    G1 X0 Y0 Z400 F{hs}
    G1 X-{radius} Y0 Z50 F{hs/2}

    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={hotend_temp - 2} MAXIMUM={hotend_temp + 2}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=170

    {% if bed_temp > 30 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp - 2} MAXIMUM={bed_temp + 2}
    {% endif %}

    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=168 MAXIMUM=172
    NOZZLE_CLEAN
    G1 X0 Y0 Z20 F{hs/2}
    BEACON_AUTO_CALIBRATE

    {% if MESH == 1 %}
        BED_MESH_CALIBRATE METHOD=scan PROBE_METHOD=PROXIMITY ADAPTIVE=1
    {% else %}
        BED_MESH_PROFILE LOAD=default
    {% endif %}

    G1 X0 Y0 Z50 F{hs/4}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={hotend_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={hotend_temp}
    SET_GCODE_OFFSET Z=0.2 MOVE=1
    G1 F600

[gcode_macro PRINT_END]
gcode:
    M83
    G91
    G1 Z0.2 E-0.4 F2400
    G1 Z10 E-10 F2400
    TURN_OFF_HEATERS
    M107 # turn off fan
    G28
    M84 # disable steppers

[gcode_macro FILAMENT_HANDLER]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Filament Handler"
    RESPOND TYPE=command MSG="action:prompt_text Do you want to load or unload filament?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Load|LOAD_FILAMENT"
    RESPOND TYPE=command MSG="action:prompt_footer_button Unload|UNLOAD_FILAMENT|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro LOAD_FILAMENT]
gcode:
    FILAMENT_TYPE_SELECTION ACTION=load

[gcode_macro UNLOAD_FILAMENT]
gcode:
    FILAMENT_TYPE_SELECTION ACTION=unload

[gcode_macro FILAMENT_TYPE_SELECTION]
gcode:
    {% set action = params.ACTION|default("load")|string|lower %}
    RESPOND TYPE=command MSG="action:prompt_begin Filament auswählen"
    RESPOND TYPE=command MSG="action:prompt_text Welches Filament? (Custom verwendet aktuelle Solltemperaturen.)"
    RESPOND TYPE=command MSG="action:prompt_footer_button PLA|PREHEAT_FILAMENT_TYPE TYPE=pla ACTION={action}"
    RESPOND TYPE=command MSG="action:prompt_footer_button PETG|PREHEAT_FILAMENT_TYPE TYPE=petg ACTION={action}"
    RESPOND TYPE=command MSG="action:prompt_footer_button ABS|PREHEAT_FILAMENT_TYPE TYPE=abs ACTION={action}"
    RESPOND TYPE=command MSG="action:prompt_footer_button Custom|PREHEAT_FILAMENT_TYPE TYPE=custom ACTION={action}"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro PREHEAT_FILAMENT_TYPE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% set type   = params.TYPE|default("pla")|string|lower %}
    {% set action = params.ACTION|default("load")|string|lower %}
    {% if type == "custom" %}
        {% set hotend_temp = printer[printer.toolhead.extruder].target %}
        {% set bed_temp    = printer.heater_bed.target %}
        {% if hotend_temp > 0 and bed_temp > 0 %}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={hotend_temp - 2} MAXIMUM={hotend_temp + 2}
            TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp - 2} MAXIMUM={bed_temp + 2}
        {% else %}
            RESPOND TYPE=error MSG="Kein Heizsollwert gesetzt – Custom nicht möglich."
        {% endif %}
    {% else %}
        {% set hotend_temp = printer["gcode_macro _USER_VARIABLES"]["extruder_" ~ type]|float %}
        {% set bed_temp    = printer["gcode_macro _USER_VARIABLES"]["bed_" ~ type]|float %}
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET={hotend_temp}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={hotend_temp - 2} MAXIMUM={hotend_temp + 2}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp - 2} MAXIMUM={bed_temp + 2}
    {% endif %}
    {% if action == "load" %}
        _DO_LOAD_FILAMENT
    {% else %}
        _DO_UNLOAD_FILAMENT
    {% endif %}

[gcode_macro _DO_LOAD_FILAMENT]
gcode:
    {% set vars = printer["gcode_macro _USER_VARIABLES"] %}
    M83
    G92 E0
    G1 E{vars.load_length_fast} F1200
    G1 E{vars.load_length_purge} F600
    _PURGE_CONFIRM_PROMPT

[gcode_macro _PURGE_CONFIRM_PROMPT]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Farbe prüfen"
    RESPOND TYPE=command MSG="action:prompt_text Farbe korrekt? Falls nicht, nochmal purgen."
    RESPOND TYPE=command MSG="action:prompt_footer_button Ja, fertig!|RESPOND TYPE=command MSG=action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Nochmal purgen|_DO_PURGE_MORE"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _DO_PURGE_MORE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% set vars = printer["gcode_macro _USER_VARIABLES"] %}
    M83
    G92 E0
    G1 E{vars.load_length_purge} F600
    _PURGE_CONFIRM_PROMPT

[gcode_macro _DO_UNLOAD_FILAMENT]
gcode:
    {% set vars = printer["gcode_macro _USER_VARIABLES"] %}
    M83
    G92 E0
    G1 E-{vars.load_length_purge} F600
    G1 E-{vars.unload_length} F1200

[gcode_macro _SENSOR_UNLOAD]
gcode:
    {% if printer.print_stats.state == "printing" or printer.print_stats.state == "paused" %}
        PREHEAT_FILAMENT_TYPE TYPE=custom ACTION=unload
    {% else %}
        UNLOAD_FILAMENT
    {% endif %}

[gcode_macro _SENSOR_LOAD]
gcode:
    {% if printer.print_stats.state == "printing" or printer.print_stats.state == "paused" %}
        PREHEAT_FILAMENT_TYPE TYPE=custom ACTION=load
    {% else %}
        LOAD_FILAMENT
    {% endif %}